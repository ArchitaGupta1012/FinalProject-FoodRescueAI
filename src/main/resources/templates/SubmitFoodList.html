<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
           /* RESET */
           * {
               margin: 0;
               padding: 0;
               box-sizing: border-box;
               font-family: 'Segoe UI', sans-serif;
           }

           /* BODY */
           body {
               background: linear-gradient(to right, #f4f7f6, #e8f5e9);
               color: #333;
           }

           /* NAVBAR */
           .navbar {
               display: flex;
               justify-content: space-between;
               align-items: center;
               padding: 15px 40px;
               background: #1b5e20;
               color: white;
               box-shadow: 0 4px 10px rgba(0,0,0,0.1);
           }

           /* LOGO */
           .logo {
               font-size: 22px;
               font-weight: bold;
               letter-spacing: 1px;
           }

           /* NAV LINKS */
           nav a {
               margin: 0 15px;
               text-decoration: none;
               color: white;
               font-weight: 500;
               transition: 0.3s;
           }

           nav a:hover {
               color: #a5d6a7;
           }

           /* DROPDOWN */
           .dropdown {
               position: relative;
               display: inline-block;
               margin: 0 15px;
               cursor: pointer;
           }

           .dropdown span {
               color: white;
               font-weight: 500;
           }

           /* FIXED DROPDOWN (important) */
           .dropdown-content {
               display: none;
               position: absolute;
               top: 100%; /* FIXED GAP ISSUE */
               left: 0;
               background: white;
               min-width: 150px;
               border-radius: 6px;
               box-shadow: 0 4px 10px rgba(0,0,0,0.15);
               z-index: 999;
               overflow: hidden;
           }

           /* Dropdown links */
           .dropdown-content a {
               display: block;
               padding: 10px;
               color: #333;
               text-decoration: none;
           }

           .dropdown-content a:hover {
               background: #e8f5e9;
           }

           /* Hover open */
           .dropdown:hover .dropdown-content {
               display: block;
           }

           /* RESULT BOX (Success Page) */
           .result-box {
               max-width: 600px;
               margin: 60px auto;
               background: white;
               padding: 30px 40px;
               border-radius: 12px;
               box-shadow: 0 8px 25px rgba(0,0,0,0.1);
               animation: fadeIn 0.6s ease-in-out;
           }

           /* Heading */
           .result-box h1 {
               text-align: center;
               color: #2e7d32;
               margin-bottom: 20px;
           }

           /* Paragraph */
           .result-box p {
               margin-bottom: 12px;
               font-size: 15px;
           }

           /* Highlighted values */
           .result-box p span {
               font-weight: 600;
               margin-left: 8px;
               color: #333;
           }

           /* Buttons (links) */
           .result-box a {
               display: inline-block;
               margin-top: 15px;
               padding: 10px 18px;
               background: #2e7d32;
               color: white;
               text-decoration: none;
               border-radius: 6px;
               transition: 0.3s;
           }

           /* Hover */
           .result-box a:hover {
               background: #1b5e20;
           }

           /* Space between buttons */
           .result-box a + a {
               margin-left: 10px;
           }

           /* Animation */
           @keyframes fadeIn {
               from {
                   opacity: 0;
                   transform: translateY(20px);
               }
               to {
                   opacity: 1;
                   transform: translateY(0);
               }
           }
    </style>
</head>
<body>
<header class="navbar">

    <div class="logo">Food Rescue AI</div>

    <nav>

        <a href="/form/home">Home</a>
        <a th:href="@{/form/about}">About</a>
        <a th:href="@{/form/contact}">Contact</a>

        <div class="dropdown">
            <span>Hotel</span>
            <div class="dropdown-content">
                <a th:href="@{/form/register}">Register</a>
                <a th:href="@{/form/login}">Login</a>
            </div>
        </div>

        <div class="dropdown">
            <span>NGO</span>
            <div class="dropdown-content">
                <a th:href="@{/form/ngoreg}">Register</a>
                <a th:href="@{/form/ngologin}">Login</a>
            </div>
        </div>

        <!-- ✅ ADD THIS -->
        <a th:href="@{/admin/adminlogin}">Admin</a>

    </nav>
</header>
<div class="result-box">

<h2>Food Registered Successfully</h2>
</div>
