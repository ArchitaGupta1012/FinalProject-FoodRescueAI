    <style>
        /* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* BODY */
body {
    background: linear-gradient(to right, #f8f9fa, #eef1f4);
    color: #333;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: #2f2f2f;
    color: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* LOGO */
.logo {
    font-size: 22px;
    font-weight: bold;
}

/* NAV LINKS */
nav a {
    margin: 0 15px;
    text-decoration: none;
    color: #e0e0e0;
    font-weight: 500;
    transition: 0.3s;
}

nav a:hover {
    color: #d4af37; /* gold touch */
}

/* DROPDOWN */
.dropdown {
    position: relative;
    display: inline-block;
    margin: 0 15px;
}

.dropdown span {
    color: #e0e0e0;
    cursor: pointer;
}

/* DROPDOWN */
.dropdown-content {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    background: white;
    min-width: 150px;
    border-radius: 6px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    z-index: 999;
}

.dropdown-content a {
    display: block;
    padding: 10px;
    color: #333;
    text-decoration: none;
}

.dropdown-content a:hover {
    background: #f1f1f1;
}

.dropdown:hover .dropdown-content {
    display: block;
}

/* ADMIN BOX (MAIN CARD) */
.admin-box {
    max-width: 400px;
    margin: 80px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    text-align: center;
    animation: fadeIn 0.6s ease-in-out;
}

/* HEADING */
.admin-box h2 {
    margin-bottom: 20px;
    color: #444;
}

/* LINKS AS BUTTONS */
.admin-box a {
    display: block;
    margin: 10px 0;
    padding: 10px;
    background: #2f2f2f;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    transition: 0.3s;
    font-size: 14px;
}

/* HOVER */
.admin-box a:hover {
    background: #1f1f1f;
}

/* LOGOUT SPECIAL STYLE */
.admin-box a:first-of-type {
    background: #b71c1c;
}

.admin-box a:first-of-type:hover {
    background: #7f0000;
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    </style>
    </head>
