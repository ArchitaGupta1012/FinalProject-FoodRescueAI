<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Choose Role - Food Rescue AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>

 /* RESET */
 * {
     margin: 0;
     padding: 0;
     box-sizing: border-box;
     font-family: 'Poppins', sans-serif;
 }

 /* BODY */
 body {
     background: #f6f8f7;
     color: #333;
 }

 /* NAVBAR */
 .navbar {
     display: flex;
     justify-content: space-between;
     align-items: center;
     padding: 15px 40px;
     background: #1b5e20;
     color: white;
     box-shadow: 0 4px 10px rgba(0,0,0,0.1);
 }

 .logo {
     font-size: 22px;
     font-weight: bold;
 }

 nav a {
     margin: 0 15px;
     text-decoration: none;
     color: white;
     font-weight: 500;
     transition: 0.3s;
 }

 nav a:hover {
     color: #a5d6a7;
 }

 /* DROPDOWN */
 .dropdown {
     position: relative;
     display: inline-block;
     margin: 0 15px;
 }

 .dropdown span {
     color: white;
     font-weight: 500;
     cursor: pointer;
 }

 .dropdown-content {
     display: none;
     position: absolute;
     top: 100%;
     left: 0;
     background: white;
     min-width: 150px;
     border-radius: 6px;
     box-shadow: 0 4px 10px rgba(0,0,0,0.15);
     z-index: 999;
 }

 .dropdown-content a {
     display: block;
     padding: 10px;
     color: #333;
     text-decoration: none;
 }

 .dropdown-content a:hover {
     background: #e8f5e9;
 }

 .dropdown:hover .dropdown-content {
     display: block;
 }

 /* MAIN CONTAINER */
 .container {
     width: 85%;
     margin: 50px auto;
     text-align: center;
 }

 .container h1 {
     font-size: 32px;
     margin-bottom: 30px;
     color: #1b5e20;
 }

 /* CARDS LAYOUT */
 .cards {
     display: flex;
     gap: 25px;
     justify-content: center;
     flex-wrap: wrap;
 }

 /* CARD STYLE */
 .card {
     background: white;
     width: 280px;
     padding: 25px;
     border-radius: 12px;
     box-shadow: 0 6px 20px rgba(0,0,0,0.08);
     transition: 0.3s;
 }

 .card:hover {
     transform: translateY(-8px);
 }

 .card h2 {
     margin-bottom: 10px;
     color: #2e7d32;
 }

 .card p {
     font-size: 14px;
     margin-bottom: 20px;
     color: #555;
 }

 /* CARD BUTTON */
 .card a {
     display: inline-block;
     padding: 10px 18px;
     background: #2e7d32;
     color: white;
     text-decoration: none;
     border-radius: 6px;
     transition: 0.3s;
 }

 .card a:hover {
     background: #1b5e20;
 }

 /* BACK BUTTON */
 .back {
     display: inline-block;
     margin-top: 30px;
     color: #1b5e20;
     font-weight: 500;
     text-decoration: none;
 }

 .back:hover {
     text-decoration: underline;
 }

 /* FOOTER */
 .simple-footer {
     margin-top: 50px;
     background: #1b5e20;
     color: white;
     padding: 15px;
     text-align: center;
 }

  </style>
</head>

<body>
<header class="navbar">

  <div class="logo">Food Rescue AI</div>

  <nav>

    <a href="/form/home">Home</a>
    <a th:href="@{/form/about}">About</a>
    <a th:href="@{/form/contact}">Contact</a>

    <div class="dropdown">
      <span>Hotel</span>
      <div class="dropdown-content">
        <a th:href="@{/form/register}">Register</a>
        <a th:href="@{/form/login}">Login</a>
      </div>
    </div>

    <div class="dropdown">
      <span>NGO</span>
      <div class="dropdown-content">
        <a th:href="@{/form/ngoreg}">Register</a>
        <a th:href="@{/form/ngologin}">Login</a>
      </div>
    </div>

    <!-- ✅ ADD THIS -->
    <a th:href="@{/admin/adminlogin}">Admin</a>

  </nav>
</header>

<div class="container">

  <h1>Choose Your Role</h1>

  <div class="cards">

    <!-- HOTEL -->
    <div class="card">
      <h2>🏨 Hotel</h2>
      <p>Donate surplus food and reduce waste.</p>
      <a th:href="@{/form/register}">Continue</a>
    </div>

    <!-- NGO -->
    <div class="card">
      <h2>🤝 NGO</h2>
      <p>Find nearby food and help people.</p>
      <a th:href="@{/form/ngoreg}">Continue</a>
    </div>

    <!-- ADMIN -->
    <div class="card">
      <h2>⚙ Admin</h2>
      <p>Manage system and monitor activities.</p>
      <a th:href="@{/admin/adminlogin}">Continue</a>
    </div>

  </div>


</div>


</body>
</html>
